# Fly.io app config for the SkyMessage API server.
# Run from `apps/server/` after `fly launch --no-deploy`.
#
#   fly secrets set SUPABASE_URL="..." SUPABASE_SERVICE_ROLE_KEY="..." ALLOWED_ORIGINS="https://skymessage.app"
#   fly deploy

app           = "skymsg-app"
primary_region = "iad"          # Ashburn, VA — closest to your Supabase project (Ohio)
kill_signal    = "SIGINT"
kill_timeout   = "5s"

[build]
  dockerfile = "../../Dockerfile-fly"  # see deploy.ps1 — copies apps/server/Dockerfile to repo root for build context

[env]
  NODE_ENV    = "production"
  SERVER_PORT = "8080"
  SERVER_HOST = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 80
    hard_limit = 120

[[http_service.checks]]
  interval     = "30s"
  timeout      = "5s"
  grace_period = "10s"
  method       = "GET"
  path         = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
